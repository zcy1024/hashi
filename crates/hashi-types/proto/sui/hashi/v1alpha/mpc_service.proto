syntax = "proto3";

package sui.hashi.v1alpha;

import "sui/rpc/v2/bcs.proto";

service MpcService {
  // Send dealer messages and receive signature.
  rpc SendMessages(SendMessagesRequest) returns (SendMessagesResponse);

  // Retrieve a dealer's messages.
  rpc RetrieveMessages(RetrieveMessagesRequest) returns (RetrieveMessagesResponse);

  // Send complaints about invalid shares and receive correct shares.
  rpc Complain(ComplainRequest) returns (ComplainResponse);

  // Get public DKG output.
  rpc GetPublicDkgOutput(GetPublicDkgOutputRequest) returns (GetPublicDkgOutputResponse);

  // Get a validator's signature on the reconfig completion message.
  rpc GetReconfigCompletionSignature(GetReconfigCompletionSignatureRequest) returns (GetReconfigCompletionSignatureResponse);

  // Push partial signatures to another party.
  rpc SendPartialSignatures(SendPartialSignaturesRequest) returns (SendPartialSignaturesResponse);

  // Pull partial signatures from another party.
  rpc GetPartialSignatures(GetPartialSignaturesRequest) returns (GetPartialSignaturesResponse);
}

message RotationMessages {
  map<uint32, sui.rpc.v2.Bcs> messages = 1;
}

message SendMessagesRequest {
  // The epoch for this MPC instance.
  optional uint64 epoch = 1;

  oneof messages {
    // For DKG: single dealer message.
    sui.rpc.v2.Bcs dkg_message = 2;

    // For key rotation: messages keyed by share index.
    RotationMessages rotation_messages = 3;
  }
}

message SendMessagesResponse {
  // The BLS12-381 signature from the receiving validator.
  optional bytes signature = 1;
}

message RetrieveMessagesRequest {
  // The epoch for this MPC instance.
  optional uint64 epoch = 1;

  // The hex-encoded Sui address of the dealer whose messages are requested.
  optional string dealer = 2;
}

message RetrieveMessagesResponse {
  oneof messages {
    // For DKG: single dealer message.
    sui.rpc.v2.Bcs dkg_message = 1;

    // For key rotation: messages keyed by share index.
    RotationMessages rotation_messages = 2;
  }
}

message ComplainRequest {
  // The epoch for this MPC instance.
  optional uint64 epoch = 1;

  // The hex-encoded Sui address of the dealer who sent invalid shares.
  optional string dealer = 2;

  // For DKG: not set.
  // For key rotation: the specific share index that triggered the complaint.
  optional uint32 share_index = 3;

  // The complaint containing proof of invalid share.
  optional sui.rpc.v2.Bcs complaint = 4;
}

message RotationResponses {
  map<uint32, sui.rpc.v2.Bcs> responses = 1;
}

message ComplainResponse {
  oneof responses {
    // For DKG: single response.
    sui.rpc.v2.Bcs dkg_response = 1;

    // For key rotation: responses keyed by share index.
    RotationResponses rotation_responses = 2;
  }
}

message GetPublicDkgOutputRequest {
  // The epoch for which to retrieve the public DKG output.
  optional uint64 epoch = 1;
}

message GetPublicDkgOutputResponse {
  // The aggregated public key.
  optional sui.rpc.v2.Bcs public_key = 1;

  // The commitments keyed by share index.
  map<uint32, sui.rpc.v2.Bcs> commitments = 2;
}

message GetReconfigCompletionSignatureRequest {
  // The target epoch after key rotation completes.
  optional uint64 epoch = 1;
}

message GetReconfigCompletionSignatureResponse {
  // The validator's BLS signature on the reconfig completion message.
  optional bytes signature = 1;
}

message SendPartialSignaturesRequest {
  // The epoch for this MPC instance.
  optional uint64 epoch = 1;

  // Hex-encoded Sui address identifying the withdrawal/deposit request.
  optional string sui_request_id = 2;

  // The public presignature nonce.
  optional sui.rpc.v2.Bcs public_presig = 3;

  // Partial signatures.
  optional sui.rpc.v2.Bcs partial_sigs = 4;
}

message SendPartialSignaturesResponse {
  // Empty response; success indicated by lack of error.
}

message GetPartialSignaturesRequest {
  // The epoch for this MPC instance.
  optional uint64 epoch = 1;

  // Hex-encoded Sui address identifying the withdrawal/deposit request.
  optional string sui_request_id = 2;
}

message GetPartialSignaturesResponse {
  // The public presignature nonce.
  optional sui.rpc.v2.Bcs public_presig = 1;

  // Partial signatures.
  optional sui.rpc.v2.Bcs partial_sigs = 2;
}
