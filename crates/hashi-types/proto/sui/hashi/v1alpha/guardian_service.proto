syntax = "proto3";

package sui.hashi.v1alpha;

import "sui/hashi/v1alpha/signature.proto";
import "sui/hashi/v1alpha/utxo.proto";

service GuardianService {
  // Query the service for general information about its current state.
  rpc GetGuardianInfo(GetGuardianInfoRequest) returns (GetGuardianInfoResponse);

  // Setup mode only: generate a new BTC key and distribute encrypted shares.
  rpc SetupNewKey(SetupNewKeyRequest) returns (SignedSetupNewKeyResponse);

  // Operator initialization: provide config and commitments before provisioning.
  rpc OperatorInit(OperatorInitRequest) returns (OperatorInitResponse);

  // Provisioner initialization: submit encrypted share and readiness info.
  rpc ProvisionerInit(ProvisionerInitRequest) returns (ProvisionerInitResponse);

  // Standard withdrawal: request immediate withdrawal signature.
  rpc StandardWithdrawal(SignedStandardWithdrawalRequest) returns (SignedStandardWithdrawalResponse);
}

message GetGuardianInfoRequest {}

message GetGuardianInfoResponse {
  // AWS Nitro attestation document.
  optional bytes attestation = 1;

  // Guardian signing public key (Ed25519, 32 bytes).
  optional bytes signing_pub_key = 2;

  // Signed guardian info (includes server version, encryption pubkey, and optional S3/bucket info).
  SignedGuardianInfo signed_info = 3;
}

// Guardian-signed wrapper around `GuardianInfoData`.
message SignedGuardianInfo {
  GuardianInfoData data = 1;

  // Milliseconds since Unix epoch.
  optional uint64 timestamp_ms = 2;

  // Guardian signature over (intent || data || timestamp).
  optional bytes signature = 3;
}

// Information about the guardian enclave.
message GuardianInfoData {
  // Share commitments (if set). Used by key provisioners to check that right key will be used.
  optional GuardianShareCommitments share_commitments = 1;

  // S3 bucket info (if set). Used by key provisioners to check S3 bucket info.
  optional S3BucketInfo bucket_info = 2;

  // Guardian encryption public key (32 bytes).
  optional bytes encryption_pubkey = 3;

  // Server version.
  optional string server_version = 4;
}

// Wrapper to allow presence for a repeated field.
message GuardianShareCommitments {
  repeated GuardianShareCommitment share_commitments = 1;
}

message S3BucketInfo {
  optional string bucket = 1;
  optional string region = 2;
}

// =======================
//      SetupNewKey
// =======================

// Untrusted wire DTO. Converted to a validated domain request in the server.
message SetupNewKeyRequest {
  // HPKE public keys for key provisioners (NUM_OF_SHARES entries expected).
  repeated bytes key_provisioner_public_keys = 1;
}

// Ciphertext produced by HPKE encryption.
message HPKECiphertext {
  optional bytes encapsulated_key = 1;
  optional bytes aes_ciphertext = 2;
}

// ShareID (NonZeroU16 in Rust). Validate 1 <= id <= 65535 in conversion.
message GuardianShareID {
  optional uint32 id = 1;
}

// Encrypted secret share sent to a key provisioner.
message GuardianShareEncrypted {
  GuardianShareID id = 1;
  HPKECiphertext ciphertext = 2;
}

// Commitment to a secret share.
message GuardianShareCommitment {
  GuardianShareID id = 1;
  optional string digest_hex = 2;
}

// Unsigned response payload.
message SetupNewKeyResponseData {
  repeated GuardianShareEncrypted encrypted_shares = 1;
  repeated GuardianShareCommitment share_commitments = 2;
}

// Application-layer signed response.
message SignedSetupNewKeyResponse {
  SetupNewKeyResponseData data = 1;

  // Milliseconds since Unix epoch.
  optional uint64 timestamp_ms = 2;

  // Signature over (intent || data || timestamp).
  optional bytes signature = 3;
}

// =======================
//      OperatorInit
// =======================

message OperatorInitRequest {
  // S3 access keys
  S3Config s3_config = 1;

  // Commitments published by the operator for the shares generated during setup.
  repeated GuardianShareCommitment share_commitments = 2;

  // Network the guardian is operating on.
  optional Network network = 3;
}

message OperatorInitResponse {}

message S3Config {
  optional string access_key = 1;
  optional string secret_key = 2;
  optional string bucket_name = 3;
  optional string region = 4;
}

enum Network {
  MAINNET = 0;
  TESTNET = 1;
  REGTEST = 2;
}

// ==========================
//      ProvisionerInit
// ==========================

message ProvisionerInitRequest {
  // Encrypted share destined for this provisioner.
  GuardianShareEncrypted encrypted_share = 1;

  // State used to initialize/restore the enclave. The share encryption binds to its digest as AAD.
  ProvisionerInitState state = 2;
}

message ProvisionerInitState {
  // Current Hashi committee.
  Committee committee = 1;

  // Withdrawal policy configuration.
  WithdrawalConfig withdrawal_config = 2;

  // X-only public key bytes (32 bytes).
  optional bytes hashi_btc_master_pubkey = 4;

  // Current rate limiter state.
  RateLimiter rate_limiter = 6;
}

message WithdrawalConfig {
  // Committee threshold expressed in terms of weight.
  optional uint64 committee_threshold = 1;

  // Maximum amount withdrawable per epoch, in sats.
  optional uint64 max_withdrawable_per_epoch_sats = 2;
}

message RateLimiter {
  // Amount withdrawn in the current epoch, in sats.
  optional uint64 withdrawn_sats = 1;

  // Current epoch.
  optional uint64 epoch = 2;
}

message ProvisionerInitResponse {}

// ============================
//    StandardWithdrawal
// ============================

// Hashi-signed wrapper for the withdrawal request.
message SignedStandardWithdrawalRequest {
  StandardWithdrawalRequestData data = 1;

  // Committee signature over the request.
  CommitteeSignature committee_signature = 2;
}

// Withdrawal request payload.
message StandardWithdrawalRequestData {
  // Unique withdrawal ID assigned by Hashi.
  optional uint64 wid = 1;

  // Transaction UTXOs (inputs and outputs).
  TxUtxos utxos = 2;
}

// Guardian-signed response.
message SignedStandardWithdrawalResponse {
  StandardWithdrawalResponseData data = 1;

  // Milliseconds since Unix epoch.
  optional uint64 timestamp_ms = 2;

  // Guardian signature over (intent || data || timestamp).
  optional bytes signature = 3;
}

// Unsigned response payload.
message StandardWithdrawalResponseData {
  // Bitcoin signatures for each input (64 bytes each, Schnorr signatures).
  repeated bytes enclave_signatures = 1;
}
