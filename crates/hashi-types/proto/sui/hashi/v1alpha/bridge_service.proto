syntax = "proto3";

package sui.hashi.v1alpha;

import "google/protobuf/timestamp.proto";
import "sui/hashi/v1alpha/signature.proto";
import "sui/hashi/v1alpha/utxo.proto";

service BridgeService {
  // Query the service for general information about its current state.
  rpc GetServiceInfo(GetServiceInfoRequest) returns (GetServiceInfoResponse);
  // Sign a deposit confirmation, confirming that bitcoin has been deposited into hashi
  rpc SignDepositConfirmation(SignDepositConfirmationRequest) returns (SignDepositConfirmationResponse);
  // Step 1: Sign approval for a batch of unapproved withdrawal requests.
  rpc SignWithdrawalRequestApproval(SignWithdrawalRequestApprovalRequest) returns (SignWithdrawalRequestApprovalResponse);
  // Step 2: Sign approval for a proposed withdrawal transaction construction,
  // confirming that the validator agrees the bitcoin transaction is valid.
  rpc SignWithdrawalTxConstruction(SignWithdrawalTxConstructionRequest) returns (SignWithdrawalTxConstructionResponse);
  // Step 2b: Sign a bitcoin withdrawal transaction (MPC Schnorr).
  rpc SignWithdrawalTransaction(SignWithdrawalTransactionRequest) returns (SignWithdrawalTransactionResponse);
  // Step 3: Sign the BLS certificate over the witness signatures for on-chain storage.
  rpc SignWithdrawalTxSigning(SignWithdrawalTxSigningRequest) returns (SignWithdrawalTxSigningResponse);
  // Step 4: Sign committee approval to confirm a processed withdrawal on-chain.
  rpc SignWithdrawalConfirmation(SignWithdrawalConfirmationRequest) returns (SignWithdrawalConfirmationResponse);
}

message GetServiceInfoRequest {}

message GetServiceInfoResponse {
  // The chain identifier of the chain that this node is on.
  //
  // The chain identifier is the digest of the genesis checkpoint, the
  // checkpoint with sequence number 0.
  optional string chain_id = 1;

  // Human-readable name of the chain that this node is on.
  //
  // This is intended to be a human-readable name like `mainnet`, `testnet`, and so on.
  optional string chain = 2;

  // Current epoch of the node based on its highest executed checkpoint.
  optional uint64 epoch = 3;

  // Checkpoint height of the most recently executed checkpoint.
  optional uint64 checkpoint_height = 4;

  // Unix timestamp of the most recently executed checkpoint.
  optional google.protobuf.Timestamp timestamp = 5;

  // The lowest checkpoint for which checkpoints and transaction data are available.
  optional uint64 lowest_available_checkpoint = 6;

  // The lowest checkpoint for which object data is available.
  optional uint64 lowest_available_checkpoint_objects = 7;

  // Software version of the service. Similar to the `server` http header.
  optional string server = 8;
}

// This maps to crate::onchain::types::DepositRequest
message SignDepositConfirmationRequest {
  // Deposit request id (32 bytes).
  bytes id = 1;

  // Bitcoin tx id (32 bytes).
  bytes txid = 2;

  // Bitcoin tx output index.
  uint32 vout = 3;

  // Bitcoin deposit amount in satoshis
  uint64 amount = 4;

  // Sui deposit address (32 bytes).
  optional bytes derivation_path = 5;

  // Timestamp of the deposit request
  uint64 timestamp_ms = 6;

  // Requester Sui address (32 bytes).
  bytes requester_address = 7;

  // Sui transaction digest (32 bytes).
  bytes sui_tx_digest = 8;
}

message SignDepositConfirmationResponse {
  MemberSignature member_signature = 1;
}

// Maps to crate::withdrawals::WithdrawalRequestApproval
message SignWithdrawalRequestApprovalRequest {
  // Withdrawal request id to approve (32 bytes).
  bytes request_id = 1;
}

message SignWithdrawalRequestApprovalResponse {
  MemberSignature member_signature = 1;
}

// Maps to crate::withdrawals::WithdrawalTxConstruction
message SignWithdrawalTxConstructionRequest {
  // Withdrawal request ids (each 32 bytes).
  repeated bytes request_ids = 1;

  // Selected UTXO ids to spend.
  repeated UtxoId selected_utxos = 2;

  // Transaction outputs (withdrawal destination + change).
  repeated WithdrawalOutput outputs = 3;

  // Bitcoin transaction id of the unsigned transaction (32 bytes).
  bytes txid = 4;
}

message WithdrawalOutput {
  // Amount in satoshis.
  uint64 amount = 1;

  // Bitcoin address (raw bytes).
  bytes bitcoin_address = 2;
}

message SignWithdrawalTxConstructionResponse {
  MemberSignature member_signature = 1;
}

message SignWithdrawalTransactionRequest {
  // The id of the PendingWithdrawal on Sui (32 bytes).
  bytes pending_withdrawal_id = 1;
}

message SignWithdrawalTransactionResponse {
  // One aggregated MPC Schnorr signature per transaction input.
  repeated bytes signatures_by_input = 1;
}

// Maps to crate::withdrawals::WithdrawalTxSigning
message SignWithdrawalTxSigningRequest {
  // Pending withdrawal id on Sui (32 bytes).
  bytes withdrawal_id = 1;

  // Withdrawal request ids (each 32 bytes).
  repeated bytes request_ids = 2;

  // One Schnorr signature per transaction input.
  repeated bytes signatures = 3;
}

message SignWithdrawalTxSigningResponse {
  MemberSignature member_signature = 1;
}

message SignWithdrawalConfirmationRequest {
  // Pending withdrawal id on Sui.
  bytes pending_withdrawal_id = 1;
}

message SignWithdrawalConfirmationResponse {
  MemberSignature member_signature = 1;
}
